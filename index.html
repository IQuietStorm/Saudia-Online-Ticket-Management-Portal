<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saudi Airline - Cloud TMS Pro Plus</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --islamic-green: #009000; 
            --saudia-gold: #8E713E; 
            --flown-bg: #D1F2EB; 
            --refund-bg: #FADBD8; 
            --na-bg: #f0f0f0; 
        }
        body { font-family: 'Times New Roman', serif; margin: 0; background-color: #f0f2f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        #login-screen { background: white; padding: 40px; border-radius: 4px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; width: 400px; border-top: 6px solid var(--islamic-green); }
        #main-app { display: none; width: 100%; max-width: 1200px; background: white; min-height: 90vh; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; margin: 20px; }
        
        /* HEADER STYLING */
        header { 
            background-color: #ffffff; 
            padding: 10px 25px; 
            border-top: 6px solid var(--islamic-green);
            border-bottom: 4px solid var(--saudia-gold); 
            display: flex; 
            align-items: center; 
            position: relative; 
            min-height: 90px;
        }
        
        .logo-box {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            width: 80px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-logo { 
            max-height: 100%; 
            max-width: 100%; 
            object-fit: contain; 
        }

        .header-title {
            margin: 0 auto;
            color: var(--islamic-green);
            letter-spacing: 2px;
            font-size: 2em;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .user-info { position: absolute; right: 25px; top: 50%; transform: translateY(-50%); text-align: right; font-family: Arial; font-size: 0.85em; color: #333; }
        
        /* UI ELEMENTS */
        .container { padding: 30px; font-family: Arial, sans-serif; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; box-sizing: border-box; margin-bottom: 10px; border-radius: 4px; }
        .dynamic-section { background: #f9f9f9; padding: 15px; border-left: 4px solid var(--saudia-gold); margin-bottom: 15px; }
        .btn-row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        button { padding: 12px 20px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; color: white; border-radius: 4px; background: var(--islamic-green); transition: 0.3s; }
        .btn-update { background: var(--saudia-gold); display: none; }
        .btn-delete { background: #b22222; display: none; }
        .btn-export { background: #2e7d32; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th { background: #f4f4f4; color: var(--islamic-green); text-align: left; padding: 12px; border-bottom: 2px solid var(--saudia-gold); cursor: pointer; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .row-flown { background-color: var(--flown-bg); }
        .row-refund { background-color: var(--refund-bg); }
        .row-na { background-color: var(--na-bg); }
        .selected-row { outline: 2px solid var(--saudia-gold); }
        label { font-size: 11px; font-weight: bold; color: #555; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color: var(--islamic-green); margin:0;">SAUDI AIRLINE</h1>
        <p id="auth-title" style="color: var(--saudia-gold); font-weight: bold;">CLOUD TMS LOGIN</p>
        <div id="reg-extra" style="display:none;"><input type="text" id="reg-fullname" placeholder="Full Name"></div>
        <input type="text" id="email" placeholder="Username/Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleAuth()" id="main-auth-btn">Sign In</button>
        <br><span id="auth-toggle" style="cursor:pointer; text-decoration:underline; font-size:12px;" onclick="toggleAuthMode()">New User? Create Account</span>
    </div>

    <div id="main-app">
        <header>
            <div class="logo-box">
                <img src="D:\Documents\WORKS\Virtual Switch International\SaudiaTMS\Saudia_Logo.png" alt="Logo" class="header-logo" onerror="this.src='https://via.placeholder.com/80x60/009000/FFFFFF?text=SAUDI'">
            </div>
            <h1 class="header-title">SAUDI AIRLINE</h1>
            <div class="user-info"><span id="display-name"></span> | <span style="cursor:pointer;" onclick="location.reload()">Logout</span></div>
        </header>

        <div class="container">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div>
                    <label>Ticket Number</label>
                    <input type="text" id="ticketNum" placeholder="065**********" maxlength="13">
                    <label>Ticket Type</label>
                    <select id="ticketType" onchange="toggleDynamicFields()">
                        <option value="Fresh Issued">Fresh Issued</option>
                        <option value="Re-issued">Re-issued</option>
                        <option value="Re-booked">Re-booked</option>
                    </select>
                    <label>Ticket Status</label>
                    <select id="ticketStatus" onchange="toggleDynamicFields()">
                        <option value="Flown">Flown</option>
                        <option value="To be Refunded">To be Refunded</option>
                        <option value="Refunded">Refunded</option>
                        <option value="N/A">N/A</option>
                    </select>
                </div>
                <div>
                    <div id="dynamic-area" class="dynamic-section">
                        <div id="issue-info">
                            <label id="dateLabel">Date of Issue</label>
                            <input type="date" id="issueDate">
                            <label>Name of Issuer</label>
                            <input type="text" id="issuerName">
                        </div>
                        <div id="reason-box" style="display:none;">
                            <label id="reasonLabel">Reason</label>
                            <input type="text" id="extraReason">
                        </div>
                        <div id="flown-box">
                            <label>Date of Flight</label>
                            <input type="date" id="flightDate">
                        </div>
                        <div id="refund-box" style="display:none;">
                            <label>Date of Refund</label>
                            <input type="date" id="refundDate">
                            <label>Refunded By</label>
                            <input type="text" id="refundBy">
                            <label>Reason for Refund</label>
                            <input type="text" id="refundReason">
                            <div id="refund-ext-box" style="display:none;">
                                <label>Recipient</label>
                                <input type="text" id="refundRecipient">
                                <label>Mode of Refund</label>
                                <select id="refundMode">
                                    <option value="Cash">Cash</option>
                                    <option value="Transfer">Transfer</option>
                                    <option value="Cheque">Cheque</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="btn-row">
                <button onclick="saveTicket()">Save Ticket</button>
                <button id="admin-upd" class="btn-update" onclick="updateTicket()">Update Selected</button>
                <button id="admin-del" class="btn-delete" onclick="deleteTicket()">Delete Selected</button>
                <button class="btn-export" onclick="exportSelectedToCSV()">Export Selected to CSV</button>
            </div>
            <input type="text" id="search" placeholder="Search ticket numbers..." onkeyup="filterTable()" style="margin-top:20px;">
            <table>
                <thead>
                    <tr>
                        <th><input type="checkbox" id="selectAll" onclick="toggleAllCheckboxes()"></th>
                        <th onclick="sortData('ticket_num')">Ticket # ↕</th>
                        <th onclick="sortData('type')">Type ↕</th>
                        <th onclick="sortData('status')">Status ↕</th>
                        <th onclick="sortData('issue_date')">Date ↕</th>
                        <th onclick="sortData('issuer_name')">Issuer ↕</th>
                        <th>Staff</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SAUDIA_URL = 'https://plztbuirvlxlbmbuscwf.supabase.co';
        const SAUDIA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsenRidWlydmx4bGJtYnVzY3dmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MjQ5OTMsImV4cCI6MjA5MjAwMDk5M30.ZJY5wVNo3SbPEgS5u5bsSZg1g8D96ak9AT0VTCm6gi8';
        const saudiaClient = window.supabase.createClient(SAUDIA_URL, SAUDIA_KEY);

        let activeUser, activeProfile, ticketsList = [], selectedTicketId = null, sortDir = 1, currentSort = 'created_at', isRegMode = false;

        function toggleAuthMode() {
            isRegMode = !isRegMode;
            const extra = document.getElementById('reg-extra');
            const btn = document.getElementById('main-auth-btn');
            const title = document.getElementById('auth-title');
            const toggle = document.getElementById('auth-toggle');
            if (isRegMode) {
                extra.style.display = 'block'; title.innerText = "CREATE ACCOUNT"; btn.innerText = "REGISTER ACCOUNT"; toggle.innerText = "Back to Login";
            } else {
                extra.style.display = 'none'; title.innerText = "CLOUD TMS LOGIN"; btn.innerText = "SIGN IN"; toggle.innerText = "New User? Create Account";
            }
        }

        async function handleAuth() {
            const emailIn = document.getElementById('email').value.trim();
            const email = emailIn.includes('@') ? emailIn : emailIn + "@saudia-tms.com";
            const password = document.getElementById('password').value;
            if (isRegMode) {
                const name = document.getElementById('reg-fullname').value;
                const { data, error } = await saudiaClient.auth.signUp({ email, password, options: { data: { full_name: name } } });
                if (error) return alert(error.message);
                await saudiaClient.from('profiles').insert([{ id: data.user.id, full_name: name, role: 'user' }]);
                alert("Account Created!"); toggleAuthMode();
            } else {
                const { data, error } = await saudiaClient.auth.signInWithPassword({ email, password });
                if (error) return alert(error.message);
                activeUser = data.user; loadApp();
            }
        }

        async function loadApp() {
            const { data } = await saudiaClient.from('profiles').select('*').eq('id', activeUser.id).single();
            activeProfile = data;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('display-name').innerText = activeProfile.full_name;
            if (activeProfile.role === 'admin') {
                document.getElementById('admin-upd').style.display = 'block';
                document.getElementById('admin-del').style.display = 'block';
            }
            getTickets();
        }

        function toggleDynamicFields() {
            const type = document.getElementById('ticketType').value;
            const status = document.getElementById('ticketStatus').value;
            
            // Type Logic
            document.getElementById('dateLabel').innerText = "Date of " + type.replace('Issued', 'Issue').replace('Re-issued', 'Re-issue').replace('Re-booked', 'Re-book');
            document.getElementById('reason-box').style.display = (type === "Fresh Issued") ? "none" : "block";
            
            // Status Logic
            document.getElementById('flown-box').style.display = (status === "Flown") ? "block" : "none";
            document.getElementById('refund-box').style.display = (status === "Flown" || status === "N/A") ? "none" : "block";
            document.getElementById('refund-ext-box').style.display = (status === "Refunded") ? "block" : "none";
            
            // N/A Logic (Hide all extra boxes except Issue Info)
            if (status === "N/A") {
                document.getElementById('flown-box').style.display = "none";
                document.getElementById('refund-box').style.display = "none";
            }
        }

        async function getTickets() {
            const { data } = await saudiaClient.from('tickets').select('*').order(currentSort, { ascending: sortDir === 1 });
            ticketsList = data || []; renderTable(ticketsList);
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody'); body.innerHTML = '';
            data.forEach(t => {
                const row = body.insertRow();
                let rowClass = 'row-na';
                if(t.status === 'Flown') rowClass = 'row-flown';
                if(t.status === 'Refunded' || t.status === 'To be Refunded') rowClass = 'row-refund';
                row.className = rowClass;
                if (selectedTicketId === t.id) row.classList.add('selected-row');
                row.innerHTML = `<td><input type="checkbox" class="export-check" data-id="${t.id}"></td><td>${t.ticket_num}</td><td>${t.type}</td><td>${t.status}</td><td>${t.issue_date || '-'}</td><td>${t.issuer_name || '-'}</td><td>${t.processed_by}</td>`;
                row.onclick = () => {
                    selectedTicketId = t.id;
                    document.getElementById('ticketNum').value = t.ticket_num;
                    document.getElementById('ticketType').value = t.type;
                    document.getElementById('ticketStatus').value = t.status;
                    document.getElementById('issueDate').value = t.issue_date;
                    document.getElementById('issuerName').value = t.issuer_name;
                    document.getElementById('extraReason').value = t.reissue_reason || t.rebook_reason || "";
                    document.getElementById('flightDate').value = t.flight_date;
                    document.getElementById('refundDate').value = t.refund_date;
                    document.getElementById('refundBy').value = t.refund_by;
                    document.getElementById('refundReason').value = t.refund_reason;
                    document.getElementById('refundRecipient').value = t.refund_recipient || "";
                    document.getElementById('refundMode').value = t.refund_mode || "Cash";
                    toggleDynamicFields(); renderTable(data);
                };
            });
        }

        function sortData(col) { sortDir = (currentSort === col) ? sortDir * -1 : 1; currentSort = col; getTickets(); }
        function toggleAllCheckboxes() { const master = document.getElementById('selectAll').checked; document.querySelectorAll('.export-check').forEach(cb => cb.checked = master); }

        function exportSelectedToCSV() {
            const ids = Array.from(document.querySelectorAll('.export-check:checked')).map(cb => cb.getAttribute('data-id'));
            if (!ids.length) return alert("Select tickets first.");
            const toExport = ticketsList.filter(t => ids.includes(t.id.toString()));
            let csv = "Ticket #,Type,Status,Date,Issuer,Flown Date,Refund Date,Refund Recipient,Refund Mode,Staff\n";
            toExport.forEach(t => csv += `${t.ticket_num},${t.type},${t.status},${t.issue_date},${t.issuer_name},${t.flight_date},${t.refund_date},${t.refund_recipient},${t.refund_mode},${t.processed_by}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'Saudi_Airline_Export.csv'; a.click();
        }

        async function saveTicket() {
            const payload = {
                ticket_num: document.getElementById('ticketNum').value,
                type: document.getElementById('ticketType').value,
                status: document.getElementById('ticketStatus').value,
                issue_date: document.getElementById('issueDate').value || null,
                issuer_name: document.getElementById('issuerName').value,
                reissue_reason: document.getElementById('ticketType').value === "Re-issued" ? document.getElementById('extraReason').value : null,
                rebook_reason: document.getElementById('ticketType').value === "Re-booked" ? document.getElementById('extraReason').value : null,
                flight_date: document.getElementById('flightDate').value || null,
                refund_date: document.getElementById('refundDate').value || null,
                refund_by: document.getElementById('refundBy').value,
                refund_reason: document.getElementById('refundReason').value,
                refund_recipient: document.getElementById('refundRecipient').value,
                refund_mode: document.getElementById('refundMode').value,
                processed_by: activeProfile.full_name
            };
            const { error } = await saudiaClient.from('tickets').insert([payload]);
            if (error) alert(error.message); else getTickets();
        }

        async function updateTicket() {
            if(!selectedTicketId) return alert("Select a ticket first.");
            const payload = {
                type: document.getElementById('ticketType').value,
                status: document.getElementById('ticketStatus').value,
                issue_date: document.getElementById('issueDate').value || null,
                issuer_name: document.getElementById('issuerName').value,
                reissue_reason: document.getElementById('ticketType').value === "Re-issued" ? document.getElementById('extraReason').value : null,
                rebook_reason: document.getElementById('ticketType').value === "Re-booked" ? document.getElementById('extraReason').value : null,
                flight_date: document.getElementById('flightDate').value || null,
                refund_date: document.getElementById('refundDate').value || null,
                refund_by: document.getElementById('refundBy').value,
                refund_reason: document.getElementById('refundReason').value,
                refund_recipient: document.getElementById('refundRecipient').value,
                refund_mode: document.getElementById('refundMode').value
            };
            const { error } = await saudiaClient.from('tickets').update(payload).eq('id', selectedTicketId);
            if (error) alert(error.message); else getTickets();
        }

        async function deleteTicket() {
            if (confirm("Delete this ticket?")) {
                await saudiaClient.from('tickets').delete().eq('id', selectedTicketId);
                getTickets();
            }
        }

        function filterTable() {
            const s = document.getElementById('search').value.toLowerCase();
            renderTable(ticketsList.filter(x => x.ticket_num.includes(s)));
        }
    </script>
</body>
</html>
