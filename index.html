<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saudi Airline - Cloud TMS</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --islamic-green: #009000; 
            --saudia-gold: #8E713E; 
            --flown-bg: #D1F2EB; 
            --refund-bg: #FADBD8; 
            --na-bg: #f0f0f0;
            --body-bg: #f0f2f0;
            --card-bg: #ffffff;
            --text-main: #333333;
            --input-border: #ccc;
            --shadow-1: 0 10px 25px rgba(0,0,0,0.10);
            --shadow-2: 0 18px 45px rgba(0,0,0,0.14);
            --radius-1: 12px;
            --radius-2: 16px;
            --focus-ring: 0 0 0 3px rgba(0, 144, 0, 0.18);
            --muted-text: rgba(0,0,0,0.55);
            --surface-2: rgba(0,0,0,0.04);
            --surface-3: rgba(0,0,0,0.06);
        }

        /* NIGHT MODE COLORS */
        [data-theme="dark"] {
            --body-bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-main: #e0e0e0;
            --input-border: #444;
            --flown-bg: #1e3d37;
            --refund-bg: #4d2b2b;
            --na-bg: #3d3d3d;
            --muted-text: rgba(255,255,255,0.65);
            --surface-2: rgba(255,255,255,0.06);
            --surface-3: rgba(255,255,255,0.09);
            --focus-ring: 0 0 0 3px rgba(142, 113, 62, 0.25);
        }

        * { box-sizing: border-box; }
        body { 
            font-family: ui-serif, Georgia, "Times New Roman", serif; 
            margin: 0; 
            background-color: var(--body-bg); 
            color: var(--text-main); 
            transition: background-color 0.25s ease, color 0.25s ease;
        }
        
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-box { 
            background: var(--card-bg); 
            padding: 38px; 
            border-radius: var(--radius-2); 
            box-shadow: var(--shadow-2); 
            text-align: center; 
            width: 100%; 
            max-width: 420px; 
            border-top: 6px solid var(--islamic-green);
        }
        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .login-logo {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: var(--surface-2);
            padding: 6px;
            object-fit: contain;
        }
        
        #main-app { 
            display: none; 
            width: 100%; 
            max-width: 1200px; 
            background: var(--card-bg); 
            min-height: 90vh; 
            border-radius: var(--radius-2); 
            box-shadow: var(--shadow-1); 
            overflow: hidden; 
            margin: 20px auto;
        }
        
        header { 
            background-color: var(--card-bg); 
            padding: 10px 25px; 
            border-top: 6px solid var(--islamic-green);
            border-bottom: 4px solid var(--saudia-gold); 
            display: flex; 
            align-items: center; 
            position: relative; 
            min-height: 90px;
            flex-wrap: wrap;
        }
        
        .logo-box { width: 80px; height: 60px; display: flex; align-items: center; justify-content: center; margin-right: 18px; }
        .header-logo { max-height: 100%; max-width: 100%; object-fit: contain; filter: drop-shadow(0 6px 10px rgba(0,0,0,0.10)); }

        .header-title {
            flex-grow: 1;
            color: var(--islamic-green);
            letter-spacing: 2px;
            font-size: 1.8em;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .title-logo {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: var(--surface-2);
            padding: 5px;
            object-fit: contain;
        }
        
        .header-controls { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .user-info { font-family: ui-sans-serif, Arial, sans-serif; font-size: 0.85em; color: var(--text-main); }
        
        .toggle-row { display: flex; gap: 8px; align-items: center; justify-content: flex-end; flex-wrap: wrap; }
        .mini-btn { 
            background: var(--saudia-gold); 
            font-size: 10px; 
            padding: 7px 10px; 
            border-radius: 999px; 
            letter-spacing: 0.4px;
        }
        .mini-btn.alt { background: var(--islamic-green); }

        .container { padding: 22px; font-family: ui-sans-serif, Arial, sans-serif; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--input-border); 
            margin-bottom: 10px; 
            border-radius: var(--radius-1); 
            background: var(--card-bg); 
            color: var(--text-main); 
            font-size: 16px; 
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.12s ease;
        }
        input:focus, select:focus { outline: none; border-color: var(--islamic-green); box-shadow: var(--focus-ring); }
        .dynamic-section { background: var(--surface-2); padding: 16px; border-left: 4px solid var(--saudia-gold); margin-bottom: 15px; border-radius: var(--radius-1); }
        .btn-row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        button { 
            padding: 12px 20px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase; 
            color: white; 
            border-radius: 999px; 
            background: var(--islamic-green); 
            transition: transform 0.12s ease, filter 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            box-shadow: 0 10px 18px rgba(0,0,0,0.10);
        }
        button:hover { filter: brightness(1.05); transform: translateY(-1px); }
        button:active { transform: translateY(0px) scale(0.99); }
        .btn-update { background: var(--saudia-gold); display: none; }
        .btn-delete { background: #b22222; display: none; }
        
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 600px; }
        th { background: var(--surface-3); color: var(--islamic-green); text-align: left; padding: 12px; border-bottom: 2px solid var(--saudia-gold); position: sticky; top: 0; backdrop-filter: blur(8px); }
        td { padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.10); }
        
        .row-flown { background-color: var(--flown-bg) !important; }
        .row-refund { background-color: var(--refund-bg) !important; }
        .row-na { background-color: var(--na-bg) !important; }
        label { font-size: 11px; font-weight: bold; color: var(--saudia-gold); display: block; margin-bottom: 2px; letter-spacing: 0.3px; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .filter-bar {
            margin-top: 18px;
            padding: 14px;
            border-radius: var(--radius-2);
            background: var(--surface-2);
            border: 1px solid rgba(0,0,0,0.06);
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr 1fr 1fr 1fr;
            gap: 12px;
            align-items: end;
        }
        [data-theme="dark"] .filter-bar { border-color: rgba(255,255,255,0.08); }
        .filter-item label { margin-bottom: 6px; }
        .filter-actions { display: flex; gap: 10px; justify-content: flex-end; align-items: center; flex-wrap: wrap; }
        .muted { color: var(--muted-text); font-size: 12px; }

        @media (max-width: 768px) {
            .input-grid { grid-template-columns: 1fr; }
            .header-title { font-size: 1.2em; order: 3; width: 100%; margin-top: 10px; }
            #main-app { margin: 0; border-radius: 0; min-height: 100vh; }
            .filter-bar { grid-template-columns: 1fr; }
        }

        [data-layout="mobile"] #main-app { margin: 0; border-radius: 0; min-height: 100vh; }
        [data-layout="mobile"] .input-grid { grid-template-columns: 1fr; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <div class="login-brand">
                <img src="logo.png" alt="Logo" class="login-logo" onerror="this.style.display='none'">
                <h1 style="color: var(--islamic-green); margin:0;">SAUDI AIRLINE</h1>
            </div>
            <p id="auth-title" style="color: var(--saudia-gold); font-weight: bold;">CLOUD TMS LOGIN</p>
            <input type="text" id="email" placeholder="Username/Email">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleAuth()" id="main-auth-btn" style="width:100%">Sign In</button>
            <br><button onclick="handleForgotPassword()" style="background:#666; width:100%; margin-top:10px;">Forgotten Password?</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <div class="logo-box">
                <img src="logo.png" alt="Logo" class="header-logo" onerror="this.src='https://via.placeholder.com/80x60/009000/FFFFFF?text=SAUDI'">
            </div>
            <h1 class="header-title">
                <img src="logo.png" alt="Logo" class="title-logo" onerror="this.style.display='none'">
                <span>SAUDI AIRLINE</span>
            </h1>
            <div class="header-controls">
                <div class="toggle-row">
                    <button id="theme-toggle" class="mini-btn" onclick="toggleTheme()">Night Mode</button>
                    <button id="layout-toggle" class="mini-btn alt" onclick="toggleLayout()">Mobile View</button>
                    <button id="admin-dash-btn" class="mini-btn" style="display:none; background:#c41e3a;" onclick="toggleAdminDashboard()">Management</button>
                </div>
                <div class="user-info"><span id="display-name"></span> | <span style="cursor:pointer; font-weight:bold;" onclick="logout()">Logout</span></div>
            </div>
        </header>

        <div id="admin-dashboard" style="display:none; padding: 20px;">
            <h2 style="color: var(--islamic-green); text-align: center; margin-bottom: 30px;">User Management Dashboard</h2>
            <div class="input-grid" style="max-width: 600px; margin: 0 auto;">
                <div>
                    <label>Full Name</label>
                    <input type="text" id="newUserName" placeholder="Enter full name">
                    <label>Email Address</label>
                    <input type="text" id="newUserEmail" placeholder="Enter email">
                    <label>Password</label>
                    <input type="password" id="newUserPassword" placeholder="Enter password">
                    <label>Role</label>
                    <select id="newUserRole">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                    <button onclick="createNewUser()" style="width:100%; margin-top:15px;">Create User</button>
                </div>
            </div>
            <div style="margin-top: 40px;">
                <h3 style="color: var(--islamic-green); text-align: center;">Existing Users</h3>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody"></tbody>
                    </table>
                </div>
            </div>
            <div style="text-align: center; margin-top: 20px;">
                <button onclick="toggleAdminDashboard()" style="background:#999;">Back to Tickets</button>
            </div>
        </div>

        <div id="tickets-container" class="container">
            <div class="input-grid">
                <div>
                    <label>Ticket Number</label>
                    <input type="text" id="ticketNum" placeholder="065**********" maxlength="13">
                    <label>Ticket Type</label>
                    <select id="ticketType" onchange="toggleDynamicFields()">
                        <option value="Fresh Issue">Fresh Issue</option>
                        <option value="Re-issue">Re-issue</option>
                        <option value="Re-booked">Re-booked</option>
                        <option value="Upgrade">Upgrade</option>
                        <option value="Downgrade">Downgrade</option>
                    </select>
                    <label>Ticket Status</label>
                    <select id="ticketStatus" onchange="toggleDynamicFields()">
                        <option value="Flown">Flown</option>
                        <option value="To be Refunded">To be Refunded</option>
                        <option value="Refunded">Refunded</option>
                        <option value="N/A">N/A</option>
                    </select>
                </div>
                <div>
                    <div id="dynamic-area" class="dynamic-section">
                        <div id="issue-info">
                            <label id="dateLabel">Date of Issue</label>
                            <input type="date" id="issueDate">
                            <label>Name of Issuer</label>
                            <input type="text" id="issuerName">
                        </div>
                        <div id="reason-box" style="display:none;">
                            <label id="reasonLabel">Reason</label>
                            <input type="text" id="extraReason" placeholder="Enter reason">
                        </div>
                        <div id="status-comment-box" style="display:none;">
                            <label>Ticket Comment</label>
                            <input type="text" id="statusComment" placeholder="Additional details">
                        </div>
                        <div id="flown-box">
                            <label>Date of Flight</label>
                            <input type="date" id="flightDate">
                        </div>
                        <div id="refund-box" style="display:none;">
                            <div id="refunded-only-box" style="display:none;">
                                <label>Refund Recipient</label>
                                <input type="text" id="refundRecipient" placeholder="Customer / Recipient name">
                                <label>Date of Refund</label>
                                <input type="date" id="refundDate">
                                <label>Mode of Refund</label>
                                <select id="refundMode">
                                    <option value="">Select mode...</option>
                                    <option value="Cash">Cash</option>
                                    <option value="Transfer">Transfer</option>
                                    <option value="Cheque">Cheque</option>
                                </select>
                            </div>
                            <label>Refunded By</label>
                            <input type="text" id="refundBy" placeholder="Staff name">
                            <label>Reason for Refund</label>
                            <input type="text" id="refundReason">
                        </div>
                    </div>
                </div>
            </div>
            <div class="btn-row">
                <button onclick="saveTicket()">Save Ticket</button>
                <button id="admin-upd" class="btn-update" onclick="updateTicket()">Update</button>
                <button id="admin-del" class="btn-delete" onclick="deleteTicket()">Delete</button>
                <button style="background:#2e7d32" onclick="exportSelectedToCSV()">Export CSV</button>
            </div>
            
            <div class="filter-bar">
                <div class="filter-item" style="grid-column: span 2;">
                    <label>Search</label>
                    <input type="text" id="search" placeholder="Search ticket numbers..." oninput="applyFiltersAndSort()">
                    <div id="result-meta" class="muted" style="margin-top:6px;"></div>
                </div>

                <div class="filter-item">
                    <label>Status</label>
                    <select id="filterStatus" onchange="applyFiltersAndSort()">
                        <option value="">All</option>
                        <option value="Flown">Flown</option>
                        <option value="To be Refunded">To be Refunded</option>
                        <option value="Refunded">Refunded</option>
                        <option value="N/A">N/A</option>
                    </select>
                </div>

                <div class="filter-item">
                    <label>Type</label>
                    <select id="filterType" onchange="applyFiltersAndSort()">
                        <option value="">All</option>
                        <option value="Fresh Issue">Fresh Issue</option>
                        <option value="Re-issue">Re-issue</option>
                        <option value="Re-booked">Re-booked</option>
                        <option value="Upgrade">Upgrade</option>
                        <option value="Downgrade">Downgrade</option>
                    </select>
                </div>

                <div class="filter-item">
                    <label>Staff</label>
                    <select id="filterStaff" onchange="applyFiltersAndSort()">
                        <option value="">All</option>
                    </select>
                </div>

                <div class="filter-item">
                    <label>Date From</label>
                    <input type="date" id="filterDateFrom" onchange="applyFiltersAndSort()">
                </div>

                <div class="filter-item">
                    <label>Date To</label>
                    <input type="date" id="filterDateTo" onchange="applyFiltersAndSort()">
                </div>

                <div class="filter-item">
                    <label>Sort by</label>
                    <select id="sortBy" onchange="applyFiltersAndSort()">
                        <option value="created_at">Created (default)</option>
                        <option value="issue_date">Date</option>
                        <option value="status">Ticket Status</option>
                        <option value="type">Ticket Type</option>
                    </select>
                </div>

                <div class="filter-actions" style="grid-column: span 2;">
                    <button class="mini-btn" onclick="resetFilters()">Reset filters</button>
                </div>
            </div>
            
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="selectAll" onclick="toggleAllCheckboxes()"></th>
                            <th>Ticket #</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Staff</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SAUDIA_URL = 'https://plztbuirvlxlbmbuscwf.supabase.co';
        const SAUDIA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsenRidWlydmx4bGJtYnVzY3dmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MjQ5OTMsImV4cCI6MjA5MjAwMDk5M30.ZJY5wVNo3SbPEgS5u5bsSZg1g8D96ak9AT0VTCm6gi8';
        const saudiaClient = window.supabase.createClient(SAUDIA_URL, SAUDIA_KEY);

        let activeUser, activeProfile, ticketsList = [], selectedTicketId = null;
        let visibleTickets = [];

        async function initAuth() {
            const { data, error } = await saudiaClient.auth.getSession();
            if (!error && data?.session?.user) {
                activeUser = data.session.user;
                loadApp();
                return;
            }
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('main-app').style.display = 'none';
        }

        async function logout() {
            await saudiaClient.auth.signOut();
            location.reload();
        }

        function applyUiPrefs() {
            const theme = localStorage.getItem('tms_theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
            const layout = localStorage.getItem('tms_layout') || 'auto';
            if (layout === 'mobile') document.documentElement.setAttribute('data-layout', 'mobile');
            else document.documentElement.removeAttribute('data-layout');
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('tms_theme', target);
        }

        function toggleLayout() {
            const current = localStorage.getItem('tms_layout') || 'auto';
            const target = current === 'mobile' ? 'auto' : 'mobile';
            localStorage.setItem('tms_layout', target);
            applyUiPrefs();
        }

        function handleForgotPassword() {
            const email = document.getElementById('email').value.trim();
            if (!email) return alert("Please enter email.");
            alert("Reset instructions sent.");
        }

        function toggleAdminDashboard() {
            const adminDash = document.getElementById('admin-dashboard');
            const ticketsCont = document.getElementById('tickets-container');
            if (adminDash.style.display === 'none') {
                adminDash.style.display = 'block';
                ticketsCont.style.display = 'none';
                loadUsers();
            } else {
                adminDash.style.display = 'none';
                ticketsCont.style.display = 'block';
            }
        }

        async function loadUsers() {
            const { data } = await saudiaClient.from('profiles').select('*');
            const body = document.getElementById('usersTableBody');
            body.innerHTML = '';
            (data || []).forEach(user => {
                const row = body.insertRow();
                row.innerHTML = `<td>${user.full_name}</td><td>${user.email || '-'}</td><td>${user.role}</td><td><button onclick="deleteUser('${user.id}')" style="background:#b22222; padding:5px 10px; font-size:11px;">Delete</button></td>`;
            });
        }

        async function createNewUser() {
            const name = document.getElementById('newUserName').value.trim();
            const email = document.getElementById('newUserEmail').value.trim();
            const password = document.getElementById('newUserPassword').value.trim();
            const role = document.getElementById('newUserRole').value;
            if (!name || !email || !password) return alert("All fields required.");
            
            const { data, error } = await saudiaClient.rpc('create_user_by_admin', {
                email, password, full_name: name, user_role: role
            });
            if (error) alert(error.message);
            else { alert('User created!'); loadUsers(); }
        }

        // REPAIRED DELETE FUNCTION
        async function deleteUser(userId) {
    if (!confirm("Are you sure you want to delete this user? This is permanent.")) return;
    
    try {
        // CHANGED: Use .rpc() to call the SQL function 'delete_user_by_admin'
        // This bypasses the need for an Edge Function entirely.
        const { data, error } = await saudiaClient.rpc('delete_user_by_admin', {
            user_id: userId
        });
        
        if (error) {
            return alert("Database Error: " + error.message);
        }
        
        alert('User account deleted successfully!');
        loadUsers(); // Refresh the user management table
        
    } catch (err) {
        alert("System Error: " + err.message);
    }
}

        async function handleAuth() {
            const emailIn = document.getElementById('email').value.trim();
            const email = emailIn.includes('@') ? emailIn : emailIn + "@saudia-tms.com";
            const password = document.getElementById('password').value;
            const { data, error } = await saudiaClient.auth.signInWithPassword({ email, password });
            if (error) return alert(error.message);
            activeUser = data.user; 
            loadApp();
        }

        async function loadApp() {
            const { data } = await saudiaClient.from('profiles').select('*').eq('id', activeUser.id).single();
            activeProfile = data;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('display-name').innerText = activeProfile.full_name;
            if (activeProfile.role === 'admin') {
                document.getElementById('admin-upd').style.display = 'inline-block';
                document.getElementById('admin-del').style.display = 'inline-block';
                document.getElementById('admin-dash-btn').style.display = 'inline-block';
            }
            getTickets();
        }

        function toggleDynamicFields() {
            const status = document.getElementById('ticketStatus').value;
            document.getElementById('flown-box').style.display = (status === "Flown") ? "block" : "none";
            document.getElementById('refund-box').style.display = (status === "Refunded" || status === "To be Refunded") ? "block" : "none";
            document.getElementById('refunded-only-box').style.display = (status === "Refunded") ? "block" : "none";
        }

        async function getTickets() {
            const { data } = await saudiaClient.from('tickets').select('*').order('created_at', { ascending: false });
            ticketsList = data || [];
            applyFiltersAndSort();
        }

        function applyFiltersAndSort() {
            renderTable(ticketsList);
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody'); body.innerHTML = '';
            data.forEach(t => {
                const row = body.insertRow();
                row.innerHTML = `<td><input type="checkbox" class="export-check" data-id="${t.id}"></td><td>${t.ticket_num}</td><td>${t.type}</td><td>${t.status}</td><td>${t.issue_date || '-'}</td><td>${t.processed_by}</td>`;
            });
        }

        async function saveTicket() {
            const payload = {
                ticket_num: document.getElementById('ticketNum').value,
                type: document.getElementById('ticketType').value,
                status: document.getElementById('ticketStatus').value,
                issue_date: document.getElementById('issueDate').value,
                processed_by: activeProfile.full_name
            };
            const { error } = await saudiaClient.from('tickets').insert([payload]);
            if (error) alert(error.message); else getTickets();
        }

        function exportSelectedToCSV() {
            alert("Exporting...");
        }

        applyUiPrefs();
        initAuth();
    </script>
</body>
</html>
