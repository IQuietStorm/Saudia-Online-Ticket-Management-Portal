<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saudi Airline - Cloud TMS</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --islamic-green: #009000; 
            --saudia-gold: #8E713E; 
            --flown-bg: #D1F2EB; 
            --refund-bg: #FADBD8; 
            --na-bg: #f0f0f0;
            --body-bg: #f0f2f0;
            --card-bg: #ffffff;
            --text-main: #333333;
            --input-border: #ccc;
        }

        /* NIGHT MODE COLORS */
        [data-theme="dark"] {
            --body-bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-main: #e0e0e0;
            --input-border: #444;
            --flown-bg: #1e3d37;
            --refund-bg: #4d2b2b;
            --na-bg: #3d3d3d;
        }

        body { font-family: 'Times New Roman', serif; margin: 0; background-color: var(--body-bg); color: var(--text-main); transition: 0.3s; }
        
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 4px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; width: 100%; max-width: 400px; border-top: 6px solid var(--islamic-green); }
        
        #main-app { display: none; width: 100%; max-width: 1200px; background: var(--card-bg); min-height: 90vh; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; margin: 20px auto; }
        
        /* HEADER STYLING */
        header { 
            background-color: var(--card-bg); 
            padding: 10px 25px; 
            border-top: 6px solid var(--islamic-green);
            border-bottom: 4px solid var(--saudia-gold); 
            display: flex; 
            align-items: center; 
            position: relative; 
            min-height: 90px;
            flex-wrap: wrap;
        }
        
        .logo-box { width: 80px; height: 60px; display: flex; align-items: center; justify-content: center; margin-right: 20px; }
        .header-logo { max-height: 100%; max-width: 100%; object-fit: contain; }

        .header-title {
            flex-grow: 1;
            color: var(--islamic-green);
            letter-spacing: 2px;
            font-size: 1.8em;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
        }
        
        .header-controls { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .user-info { font-family: Arial; font-size: 0.85em; color: var(--text-main); }
        
        /* THEME TOGGLE */
        .theme-btn { background: var(--saudia-gold); font-size: 10px; padding: 5px 10px; margin-bottom: 5px; }

        /* UI ELEMENTS */
        .container { padding: 20px; font-family: Arial, sans-serif; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--input-border); box-sizing: border-box; margin-bottom: 10px; border-radius: 4px; background: var(--card-bg); color: var(--text-main); font-size: 16px; }
        .dynamic-section { background: rgba(0,0,0,0.03); padding: 15px; border-left: 4px solid var(--saudia-gold); margin-bottom: 15px; }
        .btn-row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        button { padding: 12px 20px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; color: white; border-radius: 4px; background: var(--islamic-green); transition: 0.3s; }
        .btn-update { background: var(--saudia-gold); display: none; }
        .btn-delete { background: #b22222; display: none; }
        
        /* TABLE STYLING */
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 600px; }
        th { background: rgba(0,0,0,0.05); color: var(--islamic-green); text-align: left; padding: 12px; border-bottom: 2px solid var(--saudia-gold); }
        td { padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.1); }
        
        .row-flown { background-color: var(--flown-bg) !important; }
        .row-refund { background-color: var(--refund-bg) !important; }
        .row-na { background-color: var(--na-bg) !important; }
        label { font-size: 11px; font-weight: bold; color: var(--saudia-gold); display: block; margin-bottom: 2px; }

        /* MOBILE RESPONSIVE GRID */
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        @media (max-width: 768px) {
            .input-grid { grid-template-columns: 1fr; }
            .header-title { font-size: 1.2em; order: 3; width: 100%; margin-top: 10px; }
            #main-app { margin: 0; border-radius: 0; min-height: 100vh; }
            header { justify-content: space-between; }
            .logo-box { margin-right: 0; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1 style="color: var(--islamic-green); margin:0;">SAUDI AIRLINE</h1>
            <p id="auth-title" style="color: var(--saudia-gold); font-weight: bold;">CLOUD TMS LOGIN</p>
            <div id="reg-extra" style="display:none;"><input type="text" id="reg-fullname" placeholder="Full Name"></div>
            <input type="text" id="email" placeholder="Username/Email">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleAuth()" id="main-auth-btn" style="width:100%">Sign In</button>
            <br><br><span id="auth-toggle" style="cursor:pointer; text-decoration:underline; font-size:12px;" onclick="toggleAuthMode()">New User? Create Account</span>
        </div>
    </div>

    <div id="main-app">
        <header>
            <div class="logo-box">
                <img src="logo.png" alt="Logo" class="header-logo" onerror="this.src='https://via.placeholder.com/80x60/009000/FFFFFF?text=SAUDI'">
            </div>
            <h1 class="header-title">SAUDI AIRLINE</h1>
            <div class="header-controls">
                <button class="theme-btn" onclick="toggleTheme()">Night Mode</button>
                <div class="user-info"><span id="display-name"></span> | <span style="cursor:pointer; font-weight:bold;" onclick="location.reload()">Logout</span></div>
            </div>
        </header>

        <div class="container">
            <div class="input-grid">
                <div>
                    <label>Ticket Number</label>
                    <input type="text" id="ticketNum" placeholder="065**********" maxlength="13">
                    <label>Ticket Type</label>
                    <select id="ticketType" onchange="toggleDynamicFields()">
                        <option value="Fresh Issued">Fresh Issued</option>
                        <option value="Re-issued">Re-issued</option>
                        <option value="Re-booked">Re-booked</option>
                    </select>
                    <label>Ticket Status</label>
                    <select id="ticketStatus" onchange="toggleDynamicFields()">
                        <option value="Flown">Flown</option>
                        <option value="To be Refunded">To be Refunded</option>
                        <option value="Refunded">Refunded</option>
                        <option value="N/A">N/A</option>
                    </select>
                </div>
                <div>
                    <div id="dynamic-area" class="dynamic-section">
                        <div id="issue-info">
                            <label id="dateLabel">Date of Issue</label>
                            <input type="date" id="issueDate">
                            <label>Name of Issuer</label>
                            <input type="text" id="issuerName">
                        </div>
                        <div id="reason-box" style="display:none;">
                            <label id="reasonLabel">Type Reason</label>
                            <input type="text" id="extraReason">
                        </div>
                        <div id="status-comment-box" style="display:none;">
                            <label>Ticket Comment</label>
                            <input type="text" id="statusComment" placeholder="Details for Re-issue/Re-book">
                        </div>
                        <div id="flown-box">
                            <label>Date of Flight</label>
                            <input type="date" id="flightDate">
                        </div>
                        <div id="refund-box" style="display:none;">
                            <label>Date of Refund</label>
                            <input type="date" id="refundDate">
                            <label>Refunded By</label>
                            <input type="text" id="refundBy">
                            <label>Reason for Refund</label>
                            <input type="text" id="refundReason">
                        </div>
                    </div>
                </div>
            </div>
            <div class="btn-row">
                <button onclick="saveTicket()">Save Ticket</button>
                <button id="admin-upd" class="btn-update" onclick="updateTicket()">Update</button>
                <button id="admin-del" class="btn-delete" onclick="deleteTicket()">Delete</button>
                <button style="background:#2e7d32" onclick="exportSelectedToCSV()">Export CSV</button>
            </div>
            
            <input type="text" id="search" placeholder="Search ticket numbers..." onkeyup="filterTable()" style="margin-top:20px;">
            
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="selectAll" onclick="toggleAllCheckboxes()"></th>
                            <th>Ticket #</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Staff</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SAUDIA_URL = 'https://plztbuirvlxlbmbuscwf.supabase.co';
        const SAUDIA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsenRidWlydmx4bGJtYnVzY3dmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MjQ5OTMsImV4cCI6MjA5MjAwMDk5M30.ZJY5wVNo3SbPEgS5u5bsSZg1g8D96ak9AT0VTCm6gi8';
        const saudiaClient = window.supabase.createClient(SAUDIA_URL, SAUDIA_KEY);

        let activeUser, activeProfile, ticketsList = [], selectedTicketId = null, isRegMode = false;

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
        }

        function toggleAuthMode() {
            isRegMode = !isRegMode;
            document.getElementById('reg-extra').style.display = isRegMode ? 'block' : 'none';
            document.getElementById('auth-title').innerText = isRegMode ? "CREATE ACCOUNT" : "CLOUD TMS LOGIN";
            document.getElementById('main-auth-btn').innerText = isRegMode ? "REGISTER" : "SIGN IN";
        }

        async function handleAuth() {
            const emailIn = document.getElementById('email').value.trim();
            const email = emailIn.includes('@') ? emailIn : emailIn + "@saudia-tms.com";
            const password = document.getElementById('password').value;
            if (isRegMode) {
                const name = document.getElementById('reg-fullname').value;
                const { data, error } = await saudiaClient.auth.signUp({ email, password, options: { data: { full_name: name } } });
                if (error) return alert(error.message);
                await saudiaClient.from('profiles').insert([{ id: data.user.id, full_name: name, role: 'user' }]);
                alert("Success! Please log in."); toggleAuthMode();
            } else {
                const { data, error } = await saudiaClient.auth.signInWithPassword({ email, password });
                if (error) return alert(error.message);
                activeUser = data.user; loadApp();
            }
        }

        async function loadApp() {
            const { data } = await saudiaClient.from('profiles').select('*').eq('id', activeUser.id).single();
            activeProfile = data;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('display-name').innerText = activeProfile.full_name;
            if (activeProfile.role === 'admin') {
                document.getElementById('admin-upd').style.display = 'inline-block';
                document.getElementById('admin-del').style.display = 'inline-block';
            }
            getTickets();
        }

        function toggleDynamicFields() {
            const type = document.getElementById('ticketType').value;
            const status = document.getElementById('ticketStatus').value;
            const showExtra = (type === "Re-issued" || type === "Re-booked");
            
            document.getElementById('reason-box').style.display = showExtra ? "block" : "none";
            document.getElementById('status-comment-box').style.display = showExtra ? "block" : "none";
            document.getElementById('flown-box').style.display = (status === "Flown") ? "block" : "none";
            document.getElementById('refund-box').style.display = (status === "Refunded" || status === "To be Refunded") ? "block" : "none";
        }

        async function getTickets() {
            const { data } = await saudiaClient.from('tickets').select('*').order('created_at', { ascending: false });
            ticketsList = data || []; renderTable(ticketsList);
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody'); body.innerHTML = '';
            data.forEach(t => {
                const row = body.insertRow();
                let cls = 'row-na';
                if(t.status === 'Flown') cls = 'row-flown';
                if(t.status === 'Refunded' || t.status === 'To be Refunded') cls = 'row-refund';
                row.className = cls;
                row.innerHTML = `<td><input type="checkbox" class="export-check" data-id="${t.id}"></td><td>${t.ticket_num}</td><td>${t.type}</td><td>${t.status}</td><td>${t.issue_date || '-'}</td><td>${t.processed_by}</td>`;
                row.onclick = (e) => { if(e.target.type !== 'checkbox') selectTicket(t); };
            });
        }

        function selectTicket(t) {
            selectedTicketId = t.id;
            document.getElementById('ticketNum').value = t.ticket_num;
            document.getElementById('ticketType').value = t.type;
            document.getElementById('ticketStatus').value = t.status;
            document.getElementById('issueDate').value = t.issue_date;
            document.getElementById('statusComment').value = t.status_comment || "";
            toggleDynamicFields();
        }

        async function saveTicket() {
            const payload = {
                ticket_num: document.getElementById('ticketNum').value,
                type: document.getElementById('ticketType').value,
                status: document.getElementById('ticketStatus').value,
                issue_date: document.getElementById('issueDate').value || null,
                status_comment: document.getElementById('statusComment').value,
                processed_by: activeProfile.full_name
            };
            await saudiaClient.from('tickets').insert([payload]);
            getTickets();
        }

        function toggleAllCheckboxes() {
            const master = document.getElementById('selectAll').checked;
            document.querySelectorAll('.export-check').forEach(cb => cb.checked = master);
        }

        function filterTable() {
            const s = document.getElementById('search').value.toLowerCase();
            renderTable(ticketsList.filter(x => x.ticket_num.includes(s)));
        }
    </script>
</body>
</html>
