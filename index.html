<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saudia Airlines - Cloud TMS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --saudia-green: #006C35;
            --saudia-gold: #8E713E;
            --used-bg: #D1F2EB;
            --refund-bg: #FADBD8;
            --admin-red: #b22222;
        }

        body { font-family: 'Times New Roman', serif; margin: 0; background-color: #f0f2f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        #login-screen, #settings-screen { background: white; padding: 40px; border-radius: 4px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; width: 400px; border-top: 6px solid var(--saudia-green); }
        #main-app, #settings-screen { display: none; }

        header { background-color: var(--saudia-green); color: white; padding: 25px; text-align: center; border-bottom: 4px solid var(--saudia-gold); position: relative; }
        .user-info { position: absolute; right: 25px; top: 50%; transform: translateY(-50%); text-align: right; font-family: Arial; font-size: 0.85em; }
        
        .container { padding: 40px; font-family: Arial, sans-serif; }
        .form-group { margin-bottom: 15px; text-align: left; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; box-sizing: border-box; }

        .btn-row { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 14px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; color: white; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        .btn-save { background: var(--saudia-green); }
        .btn-export { background: #444; }
        .btn-update { background: var(--saudia-gold); display: none; }
        .btn-delete { background: var(--admin-red); display: none; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th { background: #f4f4f4; color: var(--saudia-green); text-align: left; padding: 15px; border-bottom: 2px solid var(--saudia-gold); }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 14px; cursor: pointer; }
        .row-used { background-color: var(--used-bg); }
        .row-refund { background-color: var(--refund-bg); }
        .selected-row { outline: 3px solid var(--saudia-green); background-color: #e8f5e9 !important; }
        
        footer { text-align: center; padding: 15px; font-size: 11px; color: #888; }
        .toggle-link { color: var(--saudia-green); cursor: pointer; margin-top: 15px; display: inline-block; text-decoration: underline; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color: var(--saudia-green); margin:0;">SAUDIA</h1>
        <p id="auth-title" style="color: var(--saudia-gold); font-weight: bold;">CLOUD TMS LOGIN</p>
        
        <div id="reg-extra" style="display:none;">
            <input type="text" id="reg-fullname" placeholder="Full Name" style="margin-bottom:10px;">
        </div>
        <input type="text" id="email" placeholder="Username/Email" style="margin-bottom:10px;">
        <input type="password" id="password" placeholder="Password" style="margin-bottom:15px;">

        <button class="btn-save" style="width:100%" onclick="window.handleAuth()" id="auth-btn">Sign In</button>
        <br>
        <span class="toggle-link" onclick="window.toggleAuthMode()" id="auth-toggle">New User? Create Account</span>
    </div>

    <div id="settings-screen">
        <h3>Update Security</h3>
        <input type="password" id="new-password" placeholder="New Password" style="margin-bottom:15px;">
        <div class="btn-row">
            <button class="btn-save" onclick="window.updatePassword()">Save</button>
            <button class="btn-export" onclick="window.closeSettings()">Cancel</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <h1 style="margin:0; letter-spacing: 5px;">SAUDIA</h1>
            <div class="user-info">
                <span id="display-name"></span><br>
                <span style="cursor:pointer; text-decoration:underline;" onclick="window.openSettings()">Settings</span> | 
                <span style="cursor:pointer; text-decoration:underline;" onclick="window.logout()">Logout</span>
            </div>
        </header>

        <div class="container">
            <div class="form-group">
                <label>Ticket Number (13 Digits)</label>
                <input type="text" id="ticketNum" maxlength="13">
            </div>
            <div style="display:flex; gap:15px;">
                <select id="ticketType">
                    <option>Fresh Issued</option><option>Re-issued</option><option>Re-booked</option>
                </select>
                <select id="ticketStatus">
                    <option value="Used">Used</option><option value="To be Refunded">To be Refunded</option>
                </select>
            </div>

            <div class="btn-row">
                <button class="btn-save" onclick="window.saveTicket()">Save to Cloud</button>
                <button class="btn-export" onclick="window.exportCSV()">Export CSV</button>
                <button id="admin-upd" class="btn-update" onclick="window.updateTicket()">Update</button>
                <button id="admin-del" class="btn-delete" onclick="window.deleteTicket()">Delete</button>
            </div>

            <input type="text" id="search" placeholder="Search live database..." onkeyup="window.filterTable()" style="margin-top:20px;">
            
            <table>
                <thead>
                    <tr><th>Ticket Number</th><th>Type</th><th>Status</th><th>By Staff</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <footer>PROPERTY OF SAUDIA AIRLINES © 2026</footer>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const SUPABASE_URL = 'https://plztbuirvlxlbmbuscwf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsenRidWlydmx4bGJtYnVzY3dmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MjQ5OTMsImV4cCI6MjA5MjAwMDk5M30.ZJY5wVNo3SbPEgS5u5bsSZg1g8D96ak9AT0VTCm6gi8';
        
        // --- INITIALIZE ONCE ---
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // State Variables
        let currentUser = null;
        let userProfile = null;
        let ticketsList = []; // Renamed slightly to avoid confusion
        let selectedTicketId = null;
        let isRegisterMode = false;

        // --- 2. AUTHENTICATION ---
        window.toggleAuthMode = function() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('reg-extra').style.display = isRegisterMode ? 'block' : 'none';
            document.getElementById('auth-btn').innerText = isRegisterMode ? 'Register' : 'Sign In';
            document.getElementById('auth-toggle').innerText = isRegisterMode ? 'Back to Login' : 'New User? Create Account';
            document.getElementById('auth-title').innerText = isRegisterMode ? 'CREATE ACCOUNT' : 'CLOUD TMS LOGIN';
        };

        window.handleAuth = async function() {
            const emailInput = document.getElementById('email').value.trim();
            if (!emailInput) return alert("Please enter a username or email.");
            
            const email = emailInput.includes('@') ? emailInput : emailInput + "@saudia-tms.com";
            const password = document.getElementById('password').value;

            if (isRegisterMode) {
                const fullName = document.getElementById('reg-fullname').value;
                if (!fullName) return alert("Please enter your full name.");

                const { data, error } = await supabase.auth.signUp({ email, password });
                if (error) return alert(error.message);
                
                // Insert into Profiles table
                await supabase.from('profiles').insert([{ id: data.user.id, full_name: fullName, role: 'user' }]);
                alert("Account created! Check your email for verification before signing in.");
                window.toggleAuthMode();
            } else {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) return alert("Login Error: " + error.message);
                currentUser = data.user;
                loadApp();
            }
        };

        async function loadApp() {
            const { data, error } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
            if (error) return alert("Profile load error: " + error.message);
            
            userProfile = data;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('display-name').innerText = userProfile.full_name;

            if (userProfile.role === 'admin') {
                document.getElementById('admin-upd').style.display = 'block';
                document.getElementById('admin-del').style.display = 'block';
            }
            window.fetchTickets();
        }

        // --- 3. TICKET LOGIC ---
        window.fetchTickets = async function() {
            const { data, error } = await supabase.from('tickets').select('*').order('created_at', { ascending: false });
            if (error) console.error(error);
            ticketsList = data || [];
            window.renderTable(ticketsList);
        };

        window.saveTicket = async function() {
            const num = document.getElementById('ticketNum').value.trim();
            if (num.length !== 13) return alert("13 digits required.");

            const { error } = await supabase.from('tickets').insert([{
                ticket_num: num,
                type: document.getElementById('ticketType').value,
                status: document.getElementById('ticketStatus').value,
                processed_by: userProfile.full_name
            }]);

            if (error) alert("Error: " + error.message);
            else { 
                document.getElementById('ticketNum').value = ''; 
                window.fetchTickets(); 
            }
        };

        window.updateTicket = async function() {
            if (!selectedTicketId) return alert("Select a ticket from the table first.");
            const { error } = await supabase.from('tickets').update({
                type: document.getElementById('ticketType').value,
                status: document.getElementById('ticketStatus').value
            }).eq('id', selectedTicketId);
            
            if (error) alert(error.message);
            else { alert("Ticket Updated"); window.fetchTickets(); }
        };

        window.deleteTicket = async function() {
            if (!selectedTicketId || !confirm("Delete this record permanently?")) return;
            const { error } = await supabase.from('tickets').delete().eq('id', selectedTicketId);
            if (error) alert(error.message);
            else { selectedTicketId = null; window.fetchTickets(); }
        };

        window.renderTable = function(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            data.forEach(t => {
                const row = tbody.insertRow();
                row.className = t.status === 'Used' ? 'row-used' : 'row-refund';
                if (selectedTicketId === t.id) row.classList.add('selected-row');
                
                row.onclick = () => {
                    selectedTicketId = t.id;
                    window.renderTable(data); 
                    if(userProfile && userProfile.role === 'admin') {
                        document.getElementById('ticketNum').value = t.ticket_num;
                        document.getElementById('ticketType').value = t.type;
                        document.getElementById('ticketStatus').value = t.status;
                    }
                };
                row.innerHTML = `<td>${t.ticket_num}</td><td>${t.type}</td><td>${t.status}</td><td>${t.processed_by}</td>`;
            });
        };

        window.filterTable = function() {
            const q = document.getElementById('search').value.toLowerCase();
            window.renderTable(ticketsList.filter(t => t.ticket_num.includes(q)));
        };

        window.updatePassword = async function() {
            const p = document.getElementById('new-password').value;
            if (p.length < 6) return alert("Password must be at least 6 characters.");
            const { error } = await supabase.auth.updateUser({ password: p });
            if (error) alert(error.message); 
            else { alert("Password Updated Successfully!"); window.closeSettings(); }
        };

        window.openSettings = function() { 
            document.getElementById('main-app').style.display='none'; 
            document.getElementById('settings-screen').style.display='block'; 
        };
        
        window.closeSettings = function() { 
            document.getElementById('settings-screen').style.display='none'; 
            document.getElementById('main-app').style.display='block'; 
        };

        window.logout = function() { location.reload(); };

        window.exportCSV = function() {
            if (ticketsList.length === 0) return alert("No data to export.");
            let csv = "Ticket Number,Type,Status,Staff\n" + ticketsList.map(t => `${t.ticket_num},${t.type},${t.status},${t.processed_by}`).join("\n");
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'Saudia_TMS_Report.csv';
            a.click();
        };
    </script>
</body>
</html>
