<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saudi Airline - Cloud TMS</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --islamic-green: #009000; 
            --saudia-gold: #8E713E; 
            --flown-bg: #D1F2EB; 
            --refund-bg: #FADBD8; 
            --na-bg: #f0f0f0;
            --body-bg: #f0f2f0;
            --card-bg: #ffffff;
            --text-main: #333333;
            --input-border: #ccc;
            --shadow-1: 0 10px 25px rgba(0,0,0,0.10);
            --shadow-2: 0 18px 45px rgba(0,0,0,0.14);
            --radius-1: 12px;
            --radius-2: 16px;
            --focus-ring: 0 0 0 3px rgba(0, 144, 0, 0.18);
            --muted-text: rgba(0,0,0,0.55);
            --surface-2: rgba(0,0,0,0.04);
            --surface-3: rgba(0,0,0,0.06);
        }

        /* NIGHT MODE COLORS */
        [data-theme="dark"] {
            --body-bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-main: #e0e0e0;
            --input-border: #444;
            --flown-bg: #1e3d37;
            --refund-bg: #4d2b2b;
            --na-bg: #3d3d3d;
            --muted-text: rgba(255,255,255,0.65);
            --surface-2: rgba(255,255,255,0.06);
            --surface-3: rgba(255,255,255,0.09);
            --focus-ring: 0 0 0 3px rgba(142, 113, 62, 0.25);
        }

        * { box-sizing: border-box; }
        body { 
            font-family: ui-serif, Georgia, "Times New Roman", serif; 
            margin: 0; 
            background-color: var(--body-bg); 
            color: var(--text-main); 
            transition: background-color 0.25s ease, color 0.25s ease;
        }
        
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-box { 
            background: var(--card-bg); 
            padding: 38px; 
            border-radius: var(--radius-2); 
            box-shadow: var(--shadow-2); 
            text-align: center; 
            width: 100%; 
            max-width: 420px; 
            border-top: 6px solid var(--islamic-green);
        }
        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .login-logo {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: var(--surface-2);
            padding: 6px;
            object-fit: contain;
        }
        
        #main-app { 
            display: none; 
            width: 100%; 
            max-width: 1200px; 
            background: var(--card-bg); 
            min-height: 90vh; 
            border-radius: var(--radius-2); 
            box-shadow: var(--shadow-1); 
            overflow: hidden; 
            margin: 20px auto;
        }
        
        /* HEADER STYLING */
        header { 
            background-color: var(--card-bg); 
            padding: 10px 25px; 
            border-top: 6px solid var(--islamic-green);
            border-bottom: 4px solid var(--saudia-gold); 
            display: flex; 
            align-items: center; 
            position: relative; 
            min-height: 90px;
            flex-wrap: wrap;
        }
        
        .logo-box { width: 80px; height: 60px; display: flex; align-items: center; justify-content: center; margin-right: 18px; }
        .header-logo { max-height: 100%; max-width: 100%; object-fit: contain; filter: drop-shadow(0 6px 10px rgba(0,0,0,0.10)); }

        .header-title {
            flex-grow: 1;
            color: var(--islamic-green);
            letter-spacing: 2px;
            font-size: 1.8em;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .title-logo {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: var(--surface-2);
            padding: 5px;
            object-fit: contain;
        }
        
        .header-controls { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .user-info { font-family: ui-sans-serif, Arial, sans-serif; font-size: 0.85em; color: var(--text-main); }
        
        /* HEADER TOGGLES */
        .toggle-row { display: flex; gap: 8px; align-items: center; justify-content: flex-end; flex-wrap: wrap; }
        .mini-btn { 
            background: var(--saudia-gold); 
            font-size: 10px; 
            padding: 7px 10px; 
            border-radius: 999px; 
            letter-spacing: 0.4px;
        }
        .mini-btn.alt { background: var(--islamic-green); }

        /* UI ELEMENTS */
        .container { padding: 22px; font-family: ui-sans-serif, Arial, sans-serif; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--input-border); 
            margin-bottom: 10px; 
            border-radius: var(--radius-1); 
            background: var(--card-bg); 
            color: var(--text-main); 
            font-size: 16px; 
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.12s ease;
        }
        input:focus, select:focus { outline: none; border-color: var(--islamic-green); box-shadow: var(--focus-ring); }
        .dynamic-section { background: var(--surface-2); padding: 16px; border-left: 4px solid var(--saudia-gold); margin-bottom: 15px; border-radius: var(--radius-1); }
        .btn-row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        button { 
            padding: 12px 20px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase; 
            color: white; 
            border-radius: 999px; 
            background: var(--islamic-green); 
            transition: transform 0.12s ease, filter 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            box-shadow: 0 10px 18px rgba(0,0,0,0.10);
        }
        button:hover { filter: brightness(1.05); transform: translateY(-1px); }
        button:active { transform: translateY(0px) scale(0.99); }
        button:focus-visible { outline: none; box-shadow: var(--focus-ring), 0 10px 18px rgba(0,0,0,0.10); }
        .btn-update { background: var(--saudia-gold); display: none; }
        .btn-delete { background: #b22222; display: none; }
        
        /* TABLE STYLING */
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 600px; }
        th { background: var(--surface-3); color: var(--islamic-green); text-align: left; padding: 12px; border-bottom: 2px solid var(--saudia-gold); position: sticky; top: 0; backdrop-filter: blur(8px); }
        td { padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.10); }
        tbody tr { transition: transform 0.12s ease, filter 0.2s ease, box-shadow 0.2s ease; cursor: pointer; }
        tbody tr:hover { filter: brightness(1.01); }
        tbody tr.is-selected { outline: 2px solid rgba(142, 113, 62, 0.55); outline-offset: -2px; }
        
        .row-flown { background-color: var(--flown-bg) !important; }
        .row-refund { background-color: var(--refund-bg) !important; }
        .row-na { background-color: var(--na-bg) !important; }
        label { font-size: 11px; font-weight: bold; color: var(--saudia-gold); display: block; margin-bottom: 2px; letter-spacing: 0.3px; }
        #auth-toggle { color: var(--muted-text); }
        #auth-toggle:hover { color: var(--text-main); }

        /* MOBILE RESPONSIVE GRID */
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        /* FILTER + SORT BAR */
        .filter-bar {
            margin-top: 18px;
            padding: 14px;
            border-radius: var(--radius-2);
            background: var(--surface-2);
            border: 1px solid rgba(0,0,0,0.06);
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr 1fr 1fr 1fr;
            gap: 12px;
            align-items: end;
        }
        [data-theme="dark"] .filter-bar { border-color: rgba(255,255,255,0.08); }
        .filter-item label { margin-bottom: 6px; }
        .filter-item input, .filter-item select { margin-bottom: 0; }
        .filter-actions { display: flex; gap: 10px; justify-content: flex-end; align-items: center; flex-wrap: wrap; }
        .filter-actions .mini-btn { padding: 10px 12px; font-size: 11px; }
        .muted { color: var(--muted-text); font-size: 12px; }

        @media (max-width: 768px) {
            .input-grid { grid-template-columns: 1fr; }
            .header-title { font-size: 1.2em; order: 3; width: 100%; margin-top: 10px; }
            #main-app { margin: 0; border-radius: 0; min-height: 100vh; }
            header { justify-content: space-between; }
            .logo-box { margin-right: 0; }
            .container { padding: 16px; }
            button { width: 100%; justify-content: center; }
            .btn-row { gap: 8px; }
            .filter-bar { grid-template-columns: 1fr; }
            .filter-actions { justify-content: stretch; }
            .filter-actions .mini-btn { width: 100%; }
        }

        /* MANUAL "MOBILE VIEW" TOGGLE (forces compact layout) */
        [data-layout="mobile"] #main-app { margin: 0; border-radius: 0; min-height: 100vh; }
        [data-layout="mobile"] .input-grid { grid-template-columns: 1fr; }
        [data-layout="mobile"] .container { padding: 16px; }
        [data-layout="mobile"] header { justify-content: space-between; }
        [data-layout="mobile"] .header-title { font-size: 1.2em; order: 3; width: 100%; margin-top: 10px; }
        [data-layout="mobile"] .filter-bar { grid-template-columns: 1fr; }
    </style>
        <link rel="manifest" href="manifest.json">
        <meta name="theme-color" content="#009000">
        <meta name="apple-mobile-web-app-capable" content="yes">

</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <div class="login-brand">
                <img src="logo.png" alt="Logo" class="login-logo" onerror="this.style.display='none'">
                <h1 style="color: var(--islamic-green); margin:0;">SAUDI AIRLINE</h1>
            </div>
            <p id="auth-title" style="color: var(--saudia-gold); font-weight: bold;">CLOUD TMS LOGIN</p>

            <div class="toggle-row" style="justify-content:center; margin: 10px 0 18px;">
                <button id="auth-signin-btn" class="mini-btn alt" onclick="setAuthMode('signin')">Sign In</button>
                <button id="auth-signup-btn" class="mini-btn" onclick="setAuthMode('signup')">Create Account</button>
            </div>

            <div id="signup-fields" style="display:none; text-align:left;">
                <label>Full Name</label>
                <input type="text" id="signupFullName" placeholder="Your full name">
            </div>

            <input type="email" id="email" placeholder="Email address" autocomplete="email">
            <input type="password" id="password" placeholder="Password" autocomplete="current-password">
            <button onclick="handleAuth()" id="main-auth-btn" style="width:100%">Sign In</button>
            <br><button onclick="handleForgotPassword()" style="background:#666; width:100%; margin-top:10px;">Forgotten Password?</button>
            <br><br><span id="auth-hint" style="font-size:12px; color:var(--muted-text);">Sign in to access your tickets.</span>
        </div>
    </div>

    <div id="main-app">
        <header>
            <div class="logo-box">
                <img src="logo.png" alt="Logo" class="header-logo" onerror="this.src='https://via.placeholder.com/80x60/009000/FFFFFF?text=SAUDI'">
            </div>
            <h1 class="header-title">
                <img src="logo.png" alt="Logo" class="title-logo" onerror="this.style.display='none'">
                <span>SAUDI AIRLINE</span>
            </h1>
            <div class="header-controls">
                <div class="toggle-row">
                    <button id="theme-toggle" class="mini-btn" onclick="toggleTheme()">Night Mode</button>
                    <button id="layout-toggle" class="mini-btn alt" onclick="toggleLayout()">Mobile View</button>
                    <button id="admin-dash-btn" class="mini-btn" style="display:none; background:#c41e3a;" onclick="toggleAdminDashboard()">Management</button>
                </div>
                <div class="user-info"><span id="display-name"></span> | <span style="cursor:pointer; font-weight:bold;" onclick="logout()">Logout</span></div>
            </div>
        </header>

        <div id="admin-dashboard" style="display:none; padding: 20px;">
            <h2 style="color: var(--islamic-green); text-align: center; margin-bottom: 30px;">User Management Dashboard</h2>
            <div class="input-grid" style="max-width: 600px; margin: 0 auto;">
                <div>
                    <label>Full Name</label>
                    <input type="text" id="newUserName" placeholder="Enter full name">
                    <label>Email Address</label>
                    <input type="text" id="newUserEmail" placeholder="Enter email">
                    <label>Password</label>
                    <input type="password" id="newUserPassword" placeholder="Enter password">
                    <label>Role</label>
                    <select id="newUserRole">
                        <option value="user">User</option>
                        <option value="supervisor">Supervisor</option>
                        <option value="admin">Admin</option>
                    </select>
                    <button onclick="createNewUser()" style="width:100%; margin-top:15px;">Create User</button>
                </div>
            </div>
            <div style="margin-top: 40px;">
                <h3 style="color: var(--islamic-green); text-align: center;">Existing Users</h3>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody"></tbody>
                    </table>
                </div>
            </div>
            <div style="text-align: center; margin-top: 20px;">
                <button onclick="toggleAdminDashboard()" style="background:#999;">Back to Tickets</button>
            </div>
        </div>

        <div id="tickets-container" class="container">
            <div class="input-grid">
                <div>
                    <label>Ticket Number</label>
                    <input type="text" id="ticketNum" placeholder="065**********" maxlength="13">
                    <label>Ticket Type</label>
                    <select id="ticketType" onchange="toggleDynamicFields()">
                        <option value="Fresh Issue">Fresh Issue</option>
                        <option value="Re-issue">Re-issue</option>
                        <option value="Re-booked">Re-booked</option>
                        <option value="Upgrade">Upgrade</option>
                        <option value="Downgrade">Downgrade</option>
                    </select>
                    <label>Ticket Status</label>
                    <select id="ticketStatus" onchange="toggleDynamicFields()">
                        <option value="Flown">Flown</option>
                        <option value="Refund">Refund</option>
                        <option value="Suspended">Suspended</option>
                        <option value="U-Class">U-Class</option>
                        <option value="Z-Class">Z-Class</option>
                        <option value="N/A">N/A</option>
                    </select>
                </div>
                <div>
                    <div id="dynamic-area" class="dynamic-section">
                        <div id="issue-info">
                            <label id="dateLabel">Date of Issue</label>
                            <input type="date" id="issueDate">
                            <label>Name of Issuer</label>
                            <input type="text" id="issuerName">
                        </div>
                        <div id="reason-box" style="display:none;">
                            <label id="reasonLabel">Reason</label>
                            <input type="text" id="extraReason" placeholder="Enter reason">
                        </div>
                        <div id="status-comment-box" style="display:none;">
                            <label>Ticket Comment</label>
                            <input type="text" id="statusComment" placeholder="Additional details">
                        </div>
                        <div id="flown-box">
                            <label>Date of Flight</label>
                            <input type="date" id="flightDate">
                        </div>
                        <div id="refund-box" style="display:none;">
                            <label>Refund Status</label>
                            <select id="refundStatus" onchange="toggleDynamicFields()">
                                <option value="">Select...</option>
                                <option value="Approved pending payment">Approved pending payment</option>
                                <option value="Approved and paid">Approved and paid</option>
                            </select>
                            <label>Ticket value in Naira</label>
                            <input type="number" id="ticketValueNaira" placeholder="Enter ticket value in Naira">
                            <label>Refund value in Naira</label>
                            <input type="number" id="refundValueNaira" placeholder="Enter refund value in Naira">
                            <label>Tax</label>
                            <input type="number" id="refundTax" placeholder="Enter tax amount">
                            <div id="refunded-only-box" style="display:none;">
                                <label>Refund Recipient</label>
                                <input type="text" id="refundRecipient" placeholder="Customer / Recipient name">
                                <label>Date of Refund</label>
                                <input type="date" id="refundDate">
                                <label>Mode of Refund</label>
                                <select id="refundMode">
                                    <option value="">Select mode...</option>
                                    <option value="Cash">Cash</option>
                                    <option value="Transfer">Transfer</option>
                                    <option value="Cheque">Cheque</option>
                                    <option value="Exchanged">Exchanged</option>
                                </select>
                            </div>
                            <label>Refunded By</label>
                            <input type="text" id="refundBy" placeholder="Staff name">
                            <label>Reason for Refund</label>
                            <input type="text" id="refundReason">
                        </div>
                    </div>
                </div>
            </div>
            <div class="btn-row">
                <button onclick="saveTicket()">Save Ticket</button>
                <button id="admin-upd" class="btn-update" onclick="updateTicket()">Update</button>
                <button id="admin-del" class="btn-delete" onclick="deleteTicket()">Delete</button>
                <button style="background:#2e7d32" onclick="exportSelectedToCSV()">Export CSV</button>
            </div>
            
            <div class="filter-bar">
                <div class="filter-item" style="grid-column: span 2;">
                    <label>Search</label>
                    <input type="text" id="search" placeholder="Search ticket numbers..." oninput="applyFiltersAndSort()">
                    <div id="result-meta" class="muted" style="margin-top:6px;"></div>
                </div>

                <div class="filter-item">
                    <label>Status</label>
                    <select id="filterStatus" onchange="applyFiltersAndSort()">
                        <option value="">All</option>
                        <option value="Flown">Flown</option>
                        <option value="Refund">Refund</option>
                        <option value="Suspended">Suspended</option>
                        <option value="U-Class">U-Class</option>
                        <option value="Z-Class">Z-Class</option>
                        <option value="N/A">N/A</option>
                    </select>
                </div>

                <div class="filter-item">
                    <label>Type</label>
                    <select id="filterType" onchange="applyFiltersAndSort()">
                        <option value="">All</option>
                        <option value="Fresh Issue">Fresh Issue</option>
                        <option value="Re-issue">Re-issue</option>
                        <option value="Re-booked">Re-booked</option>
                        <option value="Upgrade">Upgrade</option>
                        <option value="Downgrade">Downgrade</option>
                    </select>
                </div>

                <div class="filter-item">
                    <label>Staff</label>
                    <select id="filterStaff" onchange="applyFiltersAndSort()">
                        <option value="">All</option>
                    </select>
                </div>

                <div class="filter-item">
                    <label>Date From</label>
                    <input type="date" id="filterDateFrom" onchange="applyFiltersAndSort()">
                </div>

                <div class="filter-item">
                    <label>Date To</label>
                    <input type="date" id="filterDateTo" onchange="applyFiltersAndSort()">
                </div>

                <div class="filter-item">
                    <label>Sort by</label>
                    <select id="sortBy" onchange="applyFiltersAndSort()">
                        <option value="created_at">Created (default)</option>
                        <option value="issue_date">Date</option>
                        <option value="status">Ticket Status</option>
                        <option value="type">Ticket Type</option>
                        <option value="processed_by">Staff</option>
                    </select>
                </div>

                <div class="filter-item">
                    <label>Order</label>
                    <select id="sortDir" onchange="applyFiltersAndSort()">
                        <option value="desc">Descending</option>
                        <option value="asc">Ascending</option>
                    </select>
                </div>

                <div class="filter-actions" style="grid-column: span 2;">
                    <button class="mini-btn" onclick="resetFilters()">Reset filters</button>
                </div>
            </div>
            
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="selectAll" onclick="toggleAllCheckboxes()"></th>
                            <th>Ticket #</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Staff</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SAUDIA_URL = 'https://ztlqvltjxzxpkccaelbp.supabase.co';
        const SAUDIA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp0bHF2bHRqeHp4cGtjY2FlbGJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMzY3NTksImV4cCI6MjA5MzgxMjc1OX0.SuAx1MLFOvl4QXqVMDnCigrgpYbidN20ClCQYbU8Yxo';
        const saudiaClient = window.supabase.createClient(SAUDIA_URL, SAUDIA_KEY);

        let activeUser, activeProfile, ticketsList = [], selectedTicketId = null;
        let visibleTickets = [];
        var authMode = 'signin'; // 'signin' | 'signup'

        function hasRole(role) {
            const r = (activeProfile?.role || 'user').toLowerCase();
            return r === role;
        }

        function canEditTickets() {
            const r = (activeProfile?.role || 'user').toLowerCase();
            return r === 'admin' || r === 'supervisor';
        }

        function canManageUsers() {
            return hasRole('admin');
        }

        async function initAuth() {
            const { data, error } = await saudiaClient.auth.getSession();
            if (!error && data?.session?.user) {
                activeUser = data.session.user;
                loadApp();
                return;
            }
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('main-app').style.display = 'none';
        }

        async function logout() {
            await saudiaClient.auth.signOut();
            activeUser = null;
            activeProfile = null;
            selectedTicketId = null;
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            if (document.getElementById('signupFullName')) document.getElementById('signupFullName').value = '';
            setAuthMode('signin');
        }

        function applyUiPrefs() {
            const theme = localStorage.getItem('tms_theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);

            const layout = localStorage.getItem('tms_layout') || 'auto';
            if (layout === 'mobile') document.documentElement.setAttribute('data-layout', 'mobile');
            else document.documentElement.removeAttribute('data-layout');

            const themeBtn = document.getElementById('theme-toggle');
            if (themeBtn) themeBtn.innerText = theme === 'dark' ? 'Light Mode' : 'Night Mode';

            const layoutBtn = document.getElementById('layout-toggle');
            if (layoutBtn) layoutBtn.innerText = layout === 'mobile' ? 'Desktop View' : 'Mobile View';
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('tms_theme', target);
            applyUiPrefs();
        }

        function toggleLayout() {

        async function updateUserRole(userId, newRole) {
            if (!canManageUsers()) return alert("Admin only.");
            const role = String(newRole || '').trim().toLowerCase();
            if (!['user', 'supervisor', 'admin'].includes(role)) return alert("Invalid role.");

            const { data, error } = await saudiaClient
                .from('profiles')
                .update({ role })
                .eq('id', userId)
                .select('id, role');

            if (error) {
                console.error('Update role error:', error);
                return alert("Error updating role: " + error.message);
            }

            const updatedUser = Array.isArray(data) ? data[0] : data;
            if (!updatedUser) {
                console.warn('Role update returned no rows', data);
                // No rows were returned, but the update may still have succeeded.
                // Refresh user list to show current state.
                loadUsers();
                return alert("Role updated successfully.");
            }

            const returnedRole = String(updatedUser.role ?? '').toLowerCase();
            if (returnedRole && returnedRole !== role) {
                console.warn('Role update mismatch', data);
                return alert("Role change was not saved correctly. Please refresh and try again.");
            }

            alert("Role updated successfully.");
            loadUsers();
        }

        function formatRpcError(error) {
            // Supabase RPC errors often include status/body in `context`.
            const status = error?.context?.status;
            const body = error?.context?.body;
            const parts = [];
            if (typeof status === 'number') parts.push(`HTTP ${status}`);
            if (error?.message) parts.push(error.message);
            if (body) parts.push(typeof body === 'string' ? body : JSON.stringify(body));
            return parts.filter(Boolean).join(" - ") || "Unknown error";
        }

        async function invokeRpcWithFallback(functionNames, params) {
            let last = null;
            for (const fn of functionNames) {
                try {
                    const res = await saudiaClient.rpc(fn, params);
                    if (!res?.error) return { ...res, functionName: fn };
                    last = { ...res, functionName: fn };
                } catch (e) {
                    last = { data: null, error: e, functionName: fn };
                }
            }
            return last || { data: null, error: new Error('Unknown RPC function error'), functionName: functionNames?.[0] };
        }

            const name = document.getElementById('newUserName').value.trim();
            const email = document.getElementById('newUserEmail').value.trim();

        async function deleteUser(userId) {
    if (!confirm("Are you sure you want to delete this user?")) return;
    
    try {
        const payload = { user_id: userId };
        
        const { data, error, functionName } = await invokeRpcWithFallback(['delete_user_by_admin', 'delete_user'], payload);
        
        if (error) {
            console.error('Delete user error:', { functionName, error, data });
            const msg = formatRpcError(error);
            console.error('Formatted error:', msg);
            return alert("Error deleting user: " + msg);
        }
        
        alert('User deleted successfully!');
        loadUsers();
        
    } catch (err) {
        console.error('Delete user exception:', err);
        alert("System Error: " + err.message);
    }
}

        async function ensureProfileForUser(user, fullNameMaybe, roleMaybe) {
            if (!user?.id) return { data: null, error: new Error('Cannot create profile without user id') };

            // Check if profile exists
            const { data: existingProfile, error: existingError } = await saudiaClient
                .from('profiles')
                .select('id')
                .eq('id', user.id)
                .single();

            // If profile already exists, do NOT update it (preserves admin-set roles)
            if (existingProfile && !existingError) {
                return { data: existingProfile, error: null };
            }

            // Only insert a new profile if it doesn't exist
            if (existingError?.code === 'PGRST116') {
                const base = {
                    id: user.id,
                    email: user.email || null,
                    full_name: (fullNameMaybe || user.user_metadata?.full_name || user.user_metadata?.fullName || '').trim() || null,
                    role: String(roleMaybe || 'user').toLowerCase()
                };

                const { data, error } = await saudiaClient
                    .from('profiles')
                    .insert([base]);

                if (error) {
                    console.warn('Profile insert failed (check RLS/trigger):', error);
                }
                return { data, error };
            }

            // Some other error occurred
            console.warn('Profile check error:', existingError);
            return { data: null, error: existingError };
        }

        function populateStaffFilterOptions() {
            const staffSel = document.getElementById('filterStaff');
            if (!staffSel) return;

            const unique = Array.from(new Set((ticketsList || []).map(t => (t.processed_by || '').trim()).filter(Boolean)))
                .sort((a, b) => a.localeCompare(b));

            staffSel.innerHTML = `<option value="">All</option>` + unique.map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join('');
            staffSel.value = unique.includes(current) ? current : "";

        function applyFiltersAndSort() {
            const q = (document.getElementById('search')?.value || '').trim().toLowerCase();
            const fStatus = document.getElementById('filterStatus')?.value || '';
            const fType = document.getElementById('filterType')?.value || '';
            const fStaff = document.getElementById('filterStaff')?.value || '';
            const dateFrom = document.getElementById('filterDateFrom')?.value || '';
            const dateTo = document.getElementById('filterDateTo')?.value || '';
            const sortBy = document.getElementById('sortBy')?.value || 'created_at';
            const sortDir = document.getElementById('sortDir')?.value || 'desc';

            const fromTs = dateFrom ? Date.parse(dateFrom + 'T00:00:00') : null;
            const toTs = dateTo ? Date.parse(dateTo + 'T23:59:59') : null;

            visibleTickets = (ticketsList || []).filter(t => {
                if (q && !(String(t.ticket_num || '').toLowerCase().includes(q))) return false;
                if (fStatus && t.status !== fStatus) return false;
                if (fType && t.type !== fType) return false;
                if (fStaff && (t.processed_by || '') !== fStaff) return false;

                const issue = t.issue_date ? Date.parse(t.issue_date + 'T00:00:00') : null;
                if (fromTs && (!issue || issue < fromTs)) return false;
                if (toTs && (!issue || issue > toTs)) return false;
                return true;
            });

            const dir = sortDir === 'asc' ? 1 : -1;
            visibleTickets.sort((a, b) => dir * compareTickets(a, b, sortBy));

            renderTable(visibleTickets);
            updateResultMeta();
        }

        function compareTickets(a, b, sortBy) {
            if (sortBy === 'issue_date') {
                const ad = a.issue_date ? Date.parse(a.issue_date + 'T00:00:00') : 0;
                const bd = b.issue_date ? Date.parse(b.issue_date + 'T00:00:00') : 0;
                return ad - bd;
            }
            if (sortBy === 'created_at') {
                const ad = a.created_at ? Date.parse(a.created_at) : 0;
                const bd = b.created_at ? Date.parse(b.created_at) : 0;
                return ad - bd;
            }
            if (sortBy === 'status') return String(a.status || '').localeCompare(String(b.status || ''));
            if (sortBy === 'type') return String(a.type || '').localeCompare(String(b.type || ''));
            if (sortBy === 'processed_by') return String(a.processed_by || '').localeCompare(String(b.processed_by || ''));
            return 0;
        }

        function updateResultMeta() {
            const el = document.getElementById('result-meta');
            if (!el) return;
            const total = (ticketsList || []).length;
            const shown = (visibleTickets || []).length;
            el.textContent = `Showing ${shown} of ${total}`;
        }

        function resetFilters() {
            const ids = ['search', 'filterStatus', 'filterType', 'filterStaff', 'filterDateFrom', 'filterDateTo', 'sortBy', 'sortDir'];
            ids.forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                if (el.tagName === 'SELECT') el.value = (id === 'sortBy' ? 'created_at' : (id === 'sortDir' ? 'desc' : ''));
                else el.value = '';
            });
            applyFiltersAndSort();
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody'); body.innerHTML = '';
            data.forEach(t => {
                const row = body.insertRow();
                let cls = 'row-na';
                if(t.status === 'Flown') cls = 'row-flown';
                if(t.status === 'Refund') cls = 'row-refund';
                row.className = cls;
                row.innerHTML = `<td><input type="checkbox" class="export-check" data-id="${escapeHtml(t.id)}"></td><td>${escapeHtml(t.ticket_num || '')}</td><td>${escapeHtml(t.type || '')}</td><td>${escapeHtml(t.status || '')}</td><td>${escapeHtml(t.issue_date || '-')}</td><td>${escapeHtml(t.processed_by || '')}</td>`;
                row.onclick = (e) => { if(e.target.type !== 'checkbox') selectTicket(t, row); };

                const checkbox = row.querySelector('.export-check');
                if (checkbox) {
                    checkbox.addEventListener('change', (e) => {
                        if (e.target.checked) {
                            selectTicket(t, row);
                        } else if (selectedTicketId === t.id) {
                            selectedTicketId = null;
                            row.classList.remove('is-selected');
                        }
                    });
                }

                if (selectedTicketId && t.id === selectedTicketId) row.classList.add('is-selected');
            });
        }

        async function saveTicket() {
            const rawTicketNum = (document.getElementById('ticketNum').value || '').trim();
            if (!rawTicketNum) return alert("Ticket Number is required.");
            if (!/^\d{13}$/.test(rawTicketNum)) return alert("Ticket Number must be exactly 13 digits.");

            const type = document.getElementById('ticketType').value;
            const reasonValue = document.getElementById('extraReason').value;
            const issuerName = (document.getElementById('issuerName')?.value || '').trim();
            const flightDate = document.getElementById('flightDate')?.value || null;

            const payload = {
                ticket_num: rawTicketNum,
                type: type,
                status: document.getElementById('ticketStatus').value,
                issue_date: document.getElementById('issueDate').value || null,
                status_comment: document.getElementById('statusComment').value,
                processed_by: activeProfile.full_name,
                issuer_name: issuerName || null,
                flight_date: flightDate,
                
                // Logic to route the reason to the specific column
                reissue_reason: (type === "Re-issue") ? reasonValue : null,
                rebook_reason: (type === "Re-booked") ? reasonValue : null,
                upgrade_reason: (type === "Upgrade") ? reasonValue : null,
                downgrade_reason: (type === "Downgrade") ? reasonValue : null
            };

            // Add refund fields only when relevant
            if (payload.status === "Refund") {
                payload.refund_status = document.getElementById('refundStatus')?.value || null;
                payload.ticket_value_naira = parseFloat(document.getElementById('ticketValueNaira')?.value) || null;
                payload.refund_value_naira = parseFloat(document.getElementById('refundValueNaira')?.value) || null;
                payload.refund_tax = parseFloat(document.getElementById('refundTax')?.value) || null;
                payload.refund_by = document.getElementById('refundBy')?.value || null;
                payload.refund_reason = document.getElementById('refundReason')?.value || null;
            } else {
                payload.refund_status = null;
                payload.ticket_value_naira = null;
                payload.refund_value_naira = null;
                payload.refund_tax = null;
                payload.refund_by = null;
                payload.refund_reason = null;
            }
            if (payload.status === "Refund" && document.getElementById('refundStatus')?.value === "Approved and paid") {
                payload.refund_recipient = document.getElementById('refundRecipient')?.value || null;
                payload.refund_date = document.getElementById('refundDate')?.value || null;
                payload.refund_mode = document.getElementById('refundMode')?.value || null;
            } else {
                payload.refund_recipient = null;
                payload.refund_date = null;
                payload.refund_mode = null;
            }
            
            const { error } = await saudiaClient.from('tickets').insert([payload]);
            if (error) alert(error.message); else {
                alert('Ticket saved successfully!');
                document.getElementById('ticketNum').value = '';
                document.getElementById('ticketType').value = 'Fresh Issue';
                document.getElementById('ticketStatus').value = 'Flown';
                document.getElementById('issueDate').value = '';
                document.getElementById('issuerName').value = '';
                document.getElementById('flightDate').value = '';
                document.getElementById('extraReason').value = '';
                document.getElementById('statusComment').value = '';
                if (document.getElementById('refundStatus')) document.getElementById('refundStatus').value = '';
                if (document.getElementById('ticketValueNaira')) document.getElementById('ticketValueNaira').value = '';
                if (document.getElementById('refundValueNaira')) document.getElementById('refundValueNaira').value = '';
                if (document.getElementById('refundTax')) document.getElementById('refundTax').value = '';
                if (document.getElementById('refundRecipient')) document.getElementById('refundRecipient').value = '';
                if (document.getElementById('refundDate')) document.getElementById('refundDate').value = '';
                if (document.getElementById('refundMode')) document.getElementById('refundMode').value = '';
                if (document.getElementById('refundBy')) document.getElementById('refundBy').value = '';
                if (document.getElementById('refundReason')) document.getElementById('refundReason').value = '';
                toggleDynamicFields();
                getTickets();
            }
        }

        }

        async function updateTicket() {
            if (!activeProfile || !canEditTickets()) return alert("Supervisor/Admin only.");
            if (!selectedTicketId) return alert("Select a ticket row first.");

            const rawTicketNum = (document.getElementById('ticketNum').value || '').trim();
            if (!rawTicketNum) return alert("Ticket Number is required.");
            if (!/^\d{13}$/.test(rawTicketNum)) return alert("Ticket Number must be exactly 13 digits.");

            const type = document.getElementById('ticketType').value;
            const reasonValue = document.getElementById('extraReason').value;
            const issuerName = (document.getElementById('issuerName')?.value || '').trim();
            const flightDate = document.getElementById('flightDate')?.value || null;

            const payload = {
                ticket_num: rawTicketNum,
                type: type,
                status: document.getElementById('ticketStatus').value,
                issue_date: document.getElementById('issueDate').value || null,
                status_comment: document.getElementById('statusComment').value,
                processed_by: activeProfile.full_name,
                issuer_name: issuerName || null,
                flight_date: flightDate,
                
                // Logic to route the reason to the specific column
                reissue_reason: (type === "Re-issue") ? reasonValue : null,
                rebook_reason: (type === "Re-booked") ? reasonValue : null,
                upgrade_reason: (type === "Upgrade") ? reasonValue : null,
                downgrade_reason: (type === "Downgrade") ? reasonValue : null
            };

            if (payload.status === "Refund") {
                payload.refund_status = document.getElementById('refundStatus')?.value || null;
                payload.ticket_value_naira = parseFloat(document.getElementById('ticketValueNaira')?.value) || null;
                payload.refund_value_naira = parseFloat(document.getElementById('refundValueNaira')?.value) || null;
                payload.refund_tax = parseFloat(document.getElementById('refundTax')?.value) || null;
                payload.refund_by = document.getElementById('refundBy')?.value || null;
                payload.refund_reason = document.getElementById('refundReason')?.value || null;
            } else {
                payload.refund_status = null;
                payload.ticket_value_naira = null;
                payload.refund_value_naira = null;
                payload.refund_tax = null;
                payload.refund_by = null;
                payload.refund_reason = null;
            }

            if (payload.status === "Refund" && document.getElementById('refundStatus')?.value === "Approved and paid") {
                payload.refund_recipient = document.getElementById('refundRecipient')?.value || null;
                payload.refund_date = document.getElementById('refundDate')?.value || null;
                payload.refund_mode = document.getElementById('refundMode')?.value || null;
            } else {
                payload.refund_recipient = null;
                payload.refund_date = null;
                payload.refund_mode = null;
            }

            const { error } = await saudiaClient.from('tickets').update(payload).eq('id', selectedTicketId);
            if (error) return alert(error.message);
            alert('Ticket updated successfully!');
            await getTickets();
        }

        async function deleteTicket() {
            if (!activeProfile || !canEditTickets()) return alert("Supervisor/Admin only.");

            if (!selectedTicketId) {
                const checked = Array.from(document.querySelectorAll('.export-check:checked')).map(cb => cb.getAttribute('data-id')).filter(Boolean);
                if (checked.length === 1) {
                    selectedTicketId = checked[0];
                } else if (checked.length > 1) {
                    return alert("Select exactly one ticket row to delete, or click the ticket row first.");
                } else {
                    return alert("Select a ticket row first.");
                }
            }

            if (!confirm("Delete this ticket permanently?")) return;

            const { error } = await saudiaClient.from('tickets').delete().eq('id', selectedTicketId);
            if (error) return alert(error.message);
            alert('Ticket deleted successfully!');

            selectedTicketId = null;
            document.querySelectorAll('#tableBody tr.is-selected').forEach(el => el.classList.remove('is-selected'));
            await getTickets();
        }

        function toggleAllCheckboxes() {
            const master = document.getElementById('selectAll').checked;
            document.querySelectorAll('.export-check').forEach(cb => cb.checked = master);
        }

        function filterTable() {
            const s = document.getElementById('search').value.toLowerCase();
            renderTable(ticketsList.filter(x => x.ticket_num.includes(s)));
        }

        function exportSelectedToCSV() {
            const ids = Array.from(document.querySelectorAll('.export-check:checked')).map(cb => cb.getAttribute('data-id'));
            if (!ids.length) return alert("Select tickets first.");
            
            const toExport = ticketsList.filter(t => ids.includes(String(t.id)));
            // Added Upgrade and Downgrade columns to headers
            let csv = "Ticket #,Type,Status,Date,Issuer,Upgrade Reason,Downgrade Reason,Comment,Staff\n";
            
            toExport.forEach(t => {
                const cell = (v) => `"${String(v ?? '').replace(/"/g, '""')}"`;
                csv += [
                    cell(t.ticket_num),
                    cell(t.type),
                    cell(t.status),
                    cell(t.issue_date),
                    cell(t.issuer_name),
                    cell(t.upgrade_reason || ''),
                    cell(t.downgrade_reason || ''),
                    cell(t.status_comment || ''),
                    cell(t.processed_by)
                ].join(",") + "\n";
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Saudi_Airline_Detailed_Report_${new Date().toLocaleDateString()}.csv`;
            a.click();
        }

        applyUiPrefs();
        setAuthMode('signin');
        initAuth();
    </script>
</body>
</html>
